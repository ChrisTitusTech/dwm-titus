# ╔══════════════════════════════════════════════════════════════════════╗
# ║               DWM Theme Configuration  ·  themes.toml               ║
# ╠══════════════════════════════════════════════════════════════════════╣
# ║  LIVE RELOAD — just save this file and changes apply instantly!      ║
# ║  Manual reload: kill -USR1 $(pidof dwm)                              ║
# ╚══════════════════════════════════════════════════════════════════════╝
#
# HOW TO SWITCH THEME
# ───────────────────
# 1. Find the theme you like in the "PRESET THEMES" section below.
# 2. Copy its color values into [colors] (overwrite the current ones).
# 3. Save the file — colors update immediately, no restart needed!
#
# COLOR REFERENCE — what each setting controls
# ────────────────────────────────────────────
#   normfgcolor     → text color on unfocused windows / bar
#   normbgcolor     → background of the bar
#   normbordercolor → border color of unfocused windows
#   selfgcolor      → text color on the focused window / active tag
#   selbgcolor      → background highlight on focused window / active tag
#   selbordercolor  → border color of the focused window
#
# BORDER SIZE
# ───────────
#   borderpx = 0   → no borders (minimal look)
#   borderpx = 1   → thin, clean borders (default)
#   borderpx = 2   → thicker borders, easier to see
#   borderpx = 3   → bold borders
#
# Colors must be in hex format: "#RRGGBB"
# (Pick colors from https://coolors.co or any color picker)


# ══════════════════════════════════════════════════════════════════════════════
# ACTIVE THEME  ←  edit these values
# ══════════════════════════════════════════════════════════════════════════════

[colors]
# Unfocused windows & bar
normfgcolor     = "#D8DEE9"   # text
normbgcolor     = "#434C5E"   # background
normbordercolor = "#3B4252"   # window border

# Focused / selected window & active tag
selfgcolor      = "#ECEFF4"   # text
selbgcolor      = "#434C5E"   # background
selbordercolor  = "#81A1C1"   # window border  ← change this to make focus obvious

[appearance]
borderpx = 1   # border size in pixels (0 = none, 1-3 = recommended)


# ══════════════════════════════════════════════════════════════════════════════
# PRESET THEMES  —  copy any block into [colors] above to apply it
# ══════════════════════════════════════════════════════════════════════════════

