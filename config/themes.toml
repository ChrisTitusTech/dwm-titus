# ╔══════════════════════════════════════════════════════════════════════╗
# ║               DWM Theme Configuration  ·  themes.toml               ║
# ╠══════════════════════════════════════════════════════════════════════╣
# ║  LIVE RELOAD — just save this file and changes apply instantly!      ║
# ║  Manual reload: kill -USR1 $(pidof dwm)                              ║
# ╚══════════════════════════════════════════════════════════════════════╝
#
# HOW TO SWITCH THEME
# ───────────────────
# 1. Change the theme name in [active] below to any theme defined in this file.
# 2. Save the file — DWM, terminal, rofi, and polybar all update instantly!
#
# Available themes:
#   DARK:  nord · dracula · gruvbox · catppuccin · tokyonight · onedark
#          solarized · rosepine · everforest · monochrome
#   LIGHT: catppuccin-latte · gruvbox-light · solarized-light · rosepine-dawn · tokyonight-day
#
# BORDER SIZE
# ───────────
#   borderpx = 0   → no borders (minimal look)
#   borderpx = 1   → thin, clean borders (default)
#   borderpx = 2   → thicker borders, easier to see
#   borderpx = 3   → bold borders


# ══════════════════════════════════════════════════════════════════════════════
# ACTIVE THEME  ←  only change this
# ══════════════════════════════════════════════════════════════════════════════

[active]
theme = "nord"   # ← change only this line to switch themes

[appearance]
borderpx = 1   # border size in pixels (0 = none, 1-3 = recommended)


# ══════════════════════════════════════════════════════════════════════════════
# THEME DEFINITIONS  —  add or edit themes here
# ══════════════════════════════════════════════════════════════════════════════
#
# Each [theme.name] section defines a complete theme for all apps:
#
#   DWM colors:
#     normfgcolor / normbgcolor / normbordercolor  → unfocused bar & windows
#     selfgcolor  / selbgcolor  / selbordercolor   → focused window & active tag
#
#   Terminal colors:
#     term_bg / term_fg / term_cursor
#     term_color0 … term_color15  (standard 16-color palette)
#
#   Ghostty: ghostty_theme = "BuiltInThemeName"  (or "custom" to use term_* above)
#   Rofi:    rofi_theme    = "filename"           (without .rasi, from rofi/themes/)
#   Dark mode: dark_mode = true                   (true = dark, false = light; default: true)
#   Polybar: polybar_bg / polybar_fg / polybar_bg_alt / polybar_fg_alt / polybar_accent / polybar_urgent


