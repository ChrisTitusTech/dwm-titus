[Greeter]
# ── Background ───────────────────────────────────────────
# Wallpaper installed by 'sudo make install'
background=/usr/share/pixmaps/dwm-dohc.jpg
# Nord dark fallback shown while wallpaper loads
background-color=#2E3440
# Span wallpaper across all monitors instead of repeating
stretch-background-across-monitors=true
# Subtle dot-grid overlay for depth
draw-grid=true
# Don't replace wallpaper with per-user images
draw-user-backgrounds=false

# ── Logo ─────────────────────────────────────────────────
logo=/usr/share/pixmaps/dwm-dohc-logo.png

# ── Login panel ──────────────────────────────────────────
# Centre the login box on screen
content-align=center
theme-name=Adwaita-dark
icon-theme-name=Adwaita

# ── Font & rendering ─────────────────────────────────────
# Uses ttf-meslo-nerd (installed by install.sh)
font-name=MesloLGS NF 12
xft-antialias=true
xft-hintstyle=hintslight
xft-rgba=rgb
xft-dpi=96

# ── Clock ────────────────────────────────────────────────
show-clock=true
clock-format=%a, %b %d   %H:%M

# ── Panel items ──────────────────────────────────────────
# Session chooser reads /usr/share/xsessions automatically
show-hostname=true
show-power=true
show-a11y=false
show-keyboard=false
show-quit=true

# ── Misc ─────────────────────────────────────────────────
enable-hidpi=auto
activate-numlock=true
