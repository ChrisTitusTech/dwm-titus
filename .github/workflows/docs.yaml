name: Deploy Docs to Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/docs.yaml"
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install mdbook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "0.5.3"
      - name: Install mdbook preprocessors
        run: |
          cargo install mdbook-last-changed --version 0.4.0 --locked
          cargo install mdbook-toc --version 0.15.4 --locked
      - name: Build with mdbook
        run: mdbook build docs
      - name: Test documentation examples
        run: mdbook test docs
      - name: Setup Pages
        if: github.event_name != 'pull_request' && github.repository == 'ChrisTitusTech/dwm-titus'
        uses: actions/configure-pages@v5
      - name: Upload artifact
        if: github.event_name != 'pull_request' && github.repository == 'ChrisTitusTech/dwm-titus'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs/book

  deploy:
    if: github.event_name != 'pull_request' && github.repository == 'ChrisTitusTech/dwm-titus'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
